                        etiqueta.geometry = graphic_seleccionado.geometry.clone();
                    }
                    panel_propiedades.style.display = "none";
                }
            })
            sketchVM.on("delete", (ev) => {
                eliminarEtiqueta(ev.graphics[0]);
            })


            agregarWidgets(view);
            updateTopElementClickListener();
        }).catch(function (e) {
            console.log("Error: ", e)
        })

        //__________ESCENA INICIAL__________
        function crearPunto(y, x, etiqueta, color = "black", simbolo = null) {
            if (!simbolo) {
                simbolo = {
                    type: "simple-marker", // autocasts as new SimpleMarkerSymbol()
                    color: color,
                    size: 10,
                    outline: { // autocasts as new SimpleLineSymbol()
                        width: 2,
                        color: "white"
                    }
                }
            }

            const graphic = new Graphic({
                geometry: {
                    type: "point",
                    latitude: y,
                    longitude: x
                },
                symbol: simbolo
            })
            layer_puntos.add(graphic);
            asignarEtiqueta(graphic, etiqueta);
        }

        function asignarEtiqueta(graphic, texto) {
            const graphic_etiqueta = new Graphic({
                geometry: graphic.geometry,
                symbol: {
                    type: "text",
                    text: texto,
                    color: "black",
                    haloColor: "white",
                    haloSize: 3,
                    yoffset: 20,
                    font: {
                        size: 12
                    }
                }
            });
            if (graphic.graphic_etiqueta) { //...si ya contaba con una etiqueta previa, eliminarla.
                console.log("Ya tenía una etiqueta");
                layer_etiquetas.remove(graphic.graphic_etiqueta);
                graphic.graphic_etiqueta = null;
                console.log(graphic.graphic_etiqueta);
            }
            layer_etiquetas.add(graphic_etiqueta);
            graphic.graphic_etiqueta = graphic_etiqueta;
        }

        function eliminarEtiqueta(graphic) {
            layer_etiquetas.remove(graphic.graphic_etiqueta);
        }

        //__________FUNCIONALIDADES PARCHES__________
        function updateTopElementClickListener() {
            view.on("click", async (ev) => {
                const resultado = await view.hitTest(ev);
                const capa0 = resultado?.results[0];
                // console.log("CAPA 0", capa0);
                if (capa0.layer.type !== "vector-tile") {
                    graphic_seleccionado = capa0?.graphic
                    if (!graphic_seleccionado) { return }
                    if (sketchVM.updateGraphics.length > 0) { return }  //...si se está actualizando algún elemento, abortar.

                    sketchVM.layer = graphic_seleccionado.layer;                            //...que el layer objetivo sea la misma del objeto seleccionado
                    sketchVM.update(graphic_seleccionado);                                  //...actualizar el objeto seleccionado
                };



            })
        }
